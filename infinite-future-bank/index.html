<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a56db" />

    <title>DEUS OS | Infinite Future Bank</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
      /* ── SPLASH SCREEN ── */
      #splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: 'Inter', sans-serif;
        transition: opacity 0.55s cubic-bezier(0.4,0,0.2,1), transform 0.55s cubic-bezier(0.4,0,0.2,1);
      }
      #splash.hide {
        opacity: 0;
        transform: scale(1.06);
        pointer-events: none;
      }

      /* Ambient glow behind logo */
      .splash-glow {
        position: absolute;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(66,133,244,0.12) 0%, rgba(234,67,53,0.06) 40%, transparent 70%);
        animation: glow-pulse 2s ease-in-out infinite;
      }

      .splash-logo {
        display: flex;
        gap: 4px;
        margin-bottom: 20px;
        position: relative;
        z-index: 1;
      }
      .splash-logo span {
        font-size: 64px;
        font-weight: 900;
        letter-spacing: -3px;
        opacity: 0;
        transform: translateY(30px) scale(0.8);
        animation: letter-pop 0.5s cubic-bezier(0.34, 1.6, 0.64, 1) forwards;
        filter: drop-shadow(0 2px 12px rgba(0,0,0,0.08));
      }
      .splash-logo span:nth-child(1) { color: #4285F4; animation-delay: 0.08s; }
      .splash-logo span:nth-child(2) { color: #EA4335; animation-delay: 0.18s; }
      .splash-logo span:nth-child(3) { color: #FBBC04; animation-delay: 0.28s; }
      .splash-logo span:nth-child(4) { color: #34A853; animation-delay: 0.38s; }

      .splash-brand {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #94a3b8;
        opacity: 0;
        animation: fade-up 0.5s ease 0.58s forwards;
        position: relative;
        z-index: 1;
      }

      /* Thin progress bar at bottom — Google-style */
      .splash-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        width: 0%;
        background: linear-gradient(90deg, #4285F4, #EA4335, #FBBC04, #34A853);
        animation: progress-fill 1.2s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
        border-radius: 0 2px 2px 0;
      }

      .splash-ring {
        position: absolute;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: 1.5px solid rgba(66, 133, 244, 0.12);
        animation: ring-expand 1.6s ease 0.15s infinite;
      }
      .splash-ring:nth-child(2) {
        width: 280px;
        height: 280px;
        animation-delay: 0.6s;
        border-color: rgba(52, 168, 83, 0.08);
      }

      @keyframes letter-pop {
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes fade-up {
        to { opacity: 1; }
      }
      @keyframes ring-expand {
        0%   { transform: scale(0.65); opacity: 0.7; }
        100% { transform: scale(1.9); opacity: 0; }
      }
      @keyframes glow-pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50%       { transform: scale(1.15); opacity: 1; }
      }
      @keyframes progress-fill {
        0%   { width: 0%; }
        60%  { width: 70%; }
        100% { width: 100%; }
      }
    </style>
  </head>

  <body class="bg-white text-slate-900 antialiased">

    <!-- SPLASH SCREEN — hidden by main.jsx once React mounts -->
    <div id="splash">
      <div class="splash-glow"></div>
      <div class="splash-ring"></div>
      <div class="splash-ring"></div>
      <div class="splash-logo">
        <span>D</span>
        <span>E</span>
        <span>U</span>
        <span>S</span>
      </div>
      <div class="splash-brand">Infinite Future Bank</div>
      <div class="splash-progress"></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
